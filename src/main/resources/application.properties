# ===============================
# DATABASE (Neon PostgreSQL)
# ===============================
# IMPORTANT: do NOT commit secrets to source control. Use environment variables
# to configure the datasource in your deployment environment (Render, Railway, etc.).
# Example environment variables expected by this project:
#   SPRING_DATASOURCE_URL
#   SPRING_DATASOURCE_USERNAME
#   SPRING_DATASOURCE_PASSWORD
# The properties below read from environment variables if present.

spring.datasource.url=jdbc:postgresql://ep-wandering-scene-apawlgom.c-7.us-east-1.aws.neon.tech/neondb?sslmode=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_mgYopyiH5rl1

#spring.datasource.url=${SPRING_DATASOURCE_URL:}
#spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
#spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# FILE UPLOAD
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ===============================
# SERVER
# ===============================
server.port=8090

# ===============================
# SWAGGER
# ===============================
springdoc.swagger-ui.path=/swagger-ui.html

